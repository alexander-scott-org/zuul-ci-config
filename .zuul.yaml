- job:
    name: base
    parent: null
    description: Base job that all other jobs inherit from.
    timeout: 900
    nodeset:
      nodes:
        - name: controller
          label: ubuntu-noble

- job:
    name: my-test-job
    parent: base
    description: Run tests for my project
    run: playbooks/my-test-job/run.yaml

- project:
    check:
      jobs:
        - my-test-job
    gate:
      jobs:
        - my-test-job
